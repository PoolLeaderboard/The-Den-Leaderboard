<!DOCTYPE html>
<html>
<head>
  <title>The Den Pool Ladder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>THE DEN</h1>
    <h2>Pool Ladder</h2>
    <p>King of the Table: <span id="king">-</span></p>
  </header>

  <table id="ladder">
    <tr>
      <th>Rank</th>
      <th>Player</th>
      <th>Wins</th>
      <th>Losses</th>
      <th>Streak</th>
    </tr>
  </table>

  <div class="rules">
    <h3>The Den Ladder Rules</h3>
    <p>• Challenge up to 2 spots above you</p>
    <p>• Win → you swap positions</p>
    <p>• Lose → no change</p>
    <p>• Stats always update</p>
    <p>• One challenge per day</p>
  </div>

  <!-- Load your existing script.js -->
  <script src="script.js"></script>

<script>
window.addEventListener("load", function () {

  function updateKing() {
    const row = document.querySelector("#ladder tr:nth-child(2)");

    // ONLY run if the row actually exists
    if (row) {
      const nameCell = row.querySelector("td:nth-child(2)");
      if (nameCell) {
        document.getElementById("king").textContent = nameCell.textContent + " 👑";
      }
    }
  }

  // Run once after load
  setTimeout(updateKing, 500);

  // Keep trying every 2 seconds (for async loading)
  setInterval(updateKing, 2000);

});
</script>
</body>
</html>
