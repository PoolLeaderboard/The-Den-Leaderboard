<!DOCTYPE html>
<html>
<head>
  <title>The Den Pool Ladder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>THE DEN</h1>
    <h2>Pool Ladder</h2>
    <p>King of the Table: <span id="king">-</span></p>
  </header>

  <table id="ladder">
    <tr>
      <th>Rank</th>
      <th>Player</th>
      <th>Wins</th>
      <th>Losses</th>
      <th>Streak</th>
    </tr>
  </table>

  <div class="rules">
    <h3>The Den Ladder Rules</h3>
    <p>• Challenge up to 2 spots above you</p>
    <p>• Win → you swap positions</p>
    <p>• Lose → no change</p>
    <p>• Stats always update</p>
    <p>• One challenge per day</p>
  </div>

  <!-- Load your existing script.js -->
  <script src="script.js"></script>

 <script>
  function updateKingOfTheTable() {
    // Grab the first data row (rank 1) from the ladder table
    const firstRow = document.querySelector("#ladder tr:nth-child(2) td:nth-child(2)");
    if (firstRow) {
      document.getElementById("king").textContent = firstRow.textContent + " 👑";
    }
  }

  // Run it once after page loads
  setTimeout(updateKingOfTheTable, 100);

  // Optional: refresh every 5 seconds if ladder updates dynamically
  setInterval(updateKingOfTheTable, 5000);
</script>
</body>
</html>
